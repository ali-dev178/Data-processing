services:
  app-web:
    container_name: dps-web
    build: .
    command: ["php-fpm"]
    volumes:
      - .:/app
      - app:/var/www
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  app-worker:
    container_name: dps-worker
    build: .
    volumes:
      - .:/app
      - app:/var/www
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  nginx:
    container_name: dps-nginx
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - app:/var/www
    depends_on:
      - app-web

  postgres:
    container_name: dps-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: records_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    container_name: dps-redis
    image: redis:7-alpine
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  kafka:
    container_name: dps-kafka
    image: apache/kafka:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: 712M
    ports:
      - "9093:9092"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://dps-kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@dps-kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_NUM_PARTITIONS=3
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    container_name: dps-kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: dps-kafka:9092
    depends_on:
      - kafka

volumes:
  pgdata:
  kafka_data:
  app:
